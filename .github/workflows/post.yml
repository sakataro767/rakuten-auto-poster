name: 楽天アフィリエイト自動投稿

on:
  # 毎日 9:00 と 18:00 (JST) に実行する例
  # cronはUTC基準なので JST-9時間 で指定する（9:00 JST = 0:00 UTC, 18:00 JST = 9:00 UTC）
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 9 * * *"
  # 手動実行用（GitHubの「Actions」タブから即時テスト実行できる）
  workflow_dispatch:

# 投稿済みリストなどの状態ファイルをリポジトリにコミットし直すために書き込み権限が必要
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 投稿を実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_SITE_URL: ${{ secrets.RAKUTEN_SITE_URL }}
          RAKUTEN_KEYWORDS: "ふるさと納税,省エネ家電,消耗品,日用品,マネー本,節約 本"
          RAKUTEN_MIN_PRICE: ""
          RAKUTEN_MAX_PRICE: "50000"
          DRY_RUN: "false"
          REQUIRE_APPROVAL: "false"
          ORIGINAL_TIP_EVERY_N: "3"
        run: python main.py

      - name: 投稿済みリストの変化をリポジトリに保存
        run: |
          echo "--- 現在の作業ディレクトリ ---"
          pwd
          echo "--- ファイル一覧 ---"
          ls -la
          git config user.name "auto-poster-bot"
          git config user.email "auto-poster-bot@users.noreply.github.com"
          echo "--- git status (add前) ---"
          git status
          git add posted_items.json posted_tips.json post_count.json keyword_index.json latest_item.json
          echo "--- git status (add後) ---"
          git status
          git diff --cached --quiet || git commit -m "chore: 投稿履歴を更新"
          git push
